name: CI — Typecheck & Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck-and-build:
    name: TypeCheck & Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      SESSION_SECRET: "ci-secret-placeholder-32-chars-min"
      PORT: "8080"
      NODE_ENV: "production"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck libs
        run: pnpm run typecheck:libs

      - name: TypeCheck api-server
        run: pnpm --filter @workspace/api-server run typecheck

      - name: TypeCheck dashboard
        run: pnpm --filter @workspace/dashboard run typecheck

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Build dashboard
        env:
          BASE_PATH: "/"
        run: pnpm --filter @workspace/dashboard run build
